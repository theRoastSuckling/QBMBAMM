name: Release

on:
  push:
    tags:
      - 'r*'

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build release zip
        run: powershell -NoProfile -ExecutionPolicy Bypass -File "bump or publish helpers/publish.ps1"

      - name: Get commit title
        id: meta
        run: echo "commit_title=$(git log -1 --format=%s ${{ github.sha }})" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.meta.outputs.commit_title }}
          files: QBMBAMM-Windows.zip
