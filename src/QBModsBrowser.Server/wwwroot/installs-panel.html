<div class="w-72 shrink-0 relative">
    <div x-show="extractFeedbackMessage" x-cloak class="absolute left-0 right-0 bottom-full rounded-t-xl border border-gray-700 border-b-0 px-3 py-1">
        <p class="text-[10px] leading-tight truncate"
            :class="extractFeedbackTone === 'error' ? 'text-red-300' : extractFeedbackTone === 'success' ? 'text-emerald-300' : 'text-blue-300'"
            x-text="extractFeedbackMessage"></p>
    </div>
    <aside class="w-full bg-surface-alt border border-gray-700 flex flex-col h-[70vh] overflow-hidden"
        :class="extractFeedbackMessage ? 'rounded-b-xl rounded-t-none' : 'rounded-xl'"
        style="-webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 78%, transparent 100%); mask-image: linear-gradient(to bottom, #000 0%, #000 78%, transparent 100%);">
        <div class="flex items-center justify-between px-3 py-2 border-b border-gray-700">
            <h3 class="text-sm font-semibold text-white flex items-center gap-2">
                <iconify-icon icon="heroicons:arrow-down-tray" width="16" height="16"></iconify-icon>
                Installs
                <span x-show="downloadLog.activeCount > 0" x-cloak
                    class="inline-flex items-center justify-center h-5 min-h-0 px-2 rounded-md border border-blue-400/45 bg-blue-500/20 text-[10px] font-semibold leading-none text-blue-100 tabular-nums"
                    x-text="downloadLog.activeCount + ' active'"></span>
            </h3>
            <button type="button" @click="extractUnextractedArchives()"
                :disabled="isExtracting"
                @mouseenter.stop="showHoverTip($event, '', 'Extract and install all unextracted archives in the mods folder')"
                @mousemove.stop="moveHoverTip($event)"
                @mouseleave.stop="hideHoverTip()"
                class="inline-flex items-center gap-1.5 h-7 rounded-md border border-blue-500/70 bg-blue-600/80 px-2.5 text-xs font-semibold text-white transition hover:bg-blue-500 disabled:cursor-not-allowed disabled:opacity-70">
                <iconify-icon :icon="isExtracting ? 'heroicons:arrow-path' : 'heroicons:archive-box-arrow-down'"
                    width="14" height="14" :class="isExtracting ? 'animate-spin' : ''"></iconify-icon>
                <span x-text="isExtracting ? 'Extracting…' : 'Extract'"></span>
            </button>
        </div>
        <div class="relative flex-1 min-h-0">
            <div class="h-full overflow-y-auto overscroll-contain p-2 space-y-2 [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden">
            <template x-if="appUpdate?.status?.updateAvailable">
                <div class="rounded-md border border-amber-500/60 bg-amber-950/25 p-2.5 text-xs flex flex-col gap-1.5" style="min-height: 180px">
                    <div class="flex items-center gap-2">
                        <iconify-icon icon="heroicons:sparkles" class="text-amber-300 shrink-0" width="16" height="16"></iconify-icon>
                        <span class="font-semibold text-amber-100 truncate">App update available</span>
                        <span class="ml-auto font-mono text-[10px] text-amber-200/80 tabular-nums shrink-0"
                              x-text="appUpdate.status.currentVersion + ' -> ' + appUpdate.status.remoteVersion"></span>
                    </div>
                    <div class="flex-1 min-h-0 overflow-y-auto text-[10px] leading-snug text-gray-300 whitespace-pre-wrap [scrollbar-width:thin]"
                         x-text="appUpdate.status.releaseNotes || ''"></div>
                    <button type="button"
                        :disabled="!appUpdate.canInstall()"
                        @click="appUpdate.install()"
                        @mouseenter.stop="!appUpdate.canInstall() && appUpdate.buttonTooltip() ? showHoverTip($event, '', appUpdate.buttonTooltip()) : null"
                        @mousemove.stop="moveHoverTip($event)"
                        @mouseleave.stop="hideHoverTip()"
                        class="inline-flex items-center justify-center gap-1.5 h-7 rounded-md px-2.5 text-xs font-semibold text-white transition"
                        :class="appUpdate.canInstall()
                            ? 'bg-emerald-600 hover:bg-emerald-500 border border-emerald-400/70'
                            : 'bg-gray-600/70 border border-gray-500/50 cursor-not-allowed opacity-70'">
                        <iconify-icon :icon="appUpdate.installing ? 'heroicons:arrow-path' : 'heroicons:arrow-down-tray'"
                            :class="appUpdate.installing ? 'animate-spin' : ''" width="14" height="14"></iconify-icon>
                        <span x-text="appUpdate.installing ? 'Updating…' : 'Download & Install'"></span>
                    </button>
                </div>
            </template>
            <template x-if="visibleDownloadLogItems().length === 0">
                <p class="text-xs text-gray-500 text-center py-6">No downloads yet</p>
            </template>
            <template x-for="(dl, idx) in visibleDownloadLogItems()" :key="dl.id">
                <div>
                <div class="h-[86px] rounded-md border p-2 text-xs overflow-hidden"
                    :class="{
                        'border-blue-500/40 bg-blue-950/20': dl.status === 'Downloading' || dl.status === 'RetrievingInfo' || dl.status === 'Queued',
                        'border-emerald-500/40 bg-emerald-950/20': dl.status === 'Completed',
                        'border-amber-500/40 bg-amber-950/20': dl.status === 'Installing',
                        'border-red-500/40 bg-red-950/20': dl.status === 'Failed',
                        'border-gray-600 bg-surface-raised': dl.status === 'Canceled'
                    }">
                    <div class="flex items-center gap-2 mb-1">
                        <template x-if="dl.status === 'Queued'">
                            <iconify-icon icon="heroicons:clock" class="text-blue-400 shrink-0" width="14" height="14"></iconify-icon>
                        </template>
                        <template x-if="dl.status === 'RetrievingInfo'">
                            <iconify-icon icon="heroicons:magnifying-glass" class="text-blue-400 animate-pulse shrink-0" width="14" height="14"></iconify-icon>
                        </template>
                        <template x-if="dl.status === 'Downloading' && dl.totalBytes > 0">
                            <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 20 20">
                                <circle cx="10" cy="10" r="8" fill="none" stroke="rgba(96,165,250,0.25)" stroke-width="2.5"/>
                                <circle cx="10" cy="10" r="8" fill="none" stroke="#60a5fa" stroke-width="2.5"
                                    stroke-dasharray="50.27"
                                    :stroke-dashoffset="50.27 * (1 - (dl.progressPercent / 100))"
                                    transform="rotate(-90 10 10)" stroke-linecap="round" class="transition-all duration-300"/>
                            </svg>
                        </template>
                        <template x-if="dl.status === 'Downloading' && dl.totalBytes <= 0">
                            <svg class="w-3.5 h-3.5 shrink-0 animate-spin" viewBox="0 0 20 20">
                                <circle cx="10" cy="10" r="8" fill="none" stroke="rgba(96,165,250,0.25)" stroke-width="2.5"/>
                                <circle cx="10" cy="10" r="8" fill="none" stroke="#60a5fa" stroke-width="2.5"
                                    stroke-dasharray="50.27" stroke-dashoffset="37.7"
                                    transform="rotate(-90 10 10)" stroke-linecap="round"/>
                            </svg>
                        </template>
                        <template x-if="dl.status === 'Installing'">
                            <iconify-icon icon="heroicons:cog-6-tooth" class="text-amber-400 animate-spin shrink-0" width="14" height="14"></iconify-icon>
                        </template>
                        <template x-if="dl.status === 'Completed'">
                            <iconify-icon icon="heroicons:check-circle-solid" class="text-emerald-400 shrink-0" width="14" height="14"></iconify-icon>
                        </template>
                        <template x-if="dl.status === 'Failed'">
                            <iconify-icon icon="heroicons:x-circle-solid" class="text-red-400 shrink-0" width="14" height="14"></iconify-icon>
                        </template>
                        <template x-if="dl.status === 'Canceled'">
                            <iconify-icon icon="heroicons:minus-circle" class="text-gray-500 shrink-0" width="14" height="14"></iconify-icon>
                        </template>
                        <iconify-icon :icon="logSourceIcon(dl)"
                            :class="'shrink-0 ' + logSourceIconClass(dl)"
                            @mouseenter.stop="showHoverTip($event, '', logSourceLabel(dl))"
                            @mousemove.stop="moveHoverTip($event)"
                            @mouseleave.stop="hideHoverTip()"
                            width="12" height="12"></iconify-icon>
                        <span class="truncate font-medium text-gray-200" x-text="(dl.modName || 'Unknown').substring(0, 30)"></span>
                    </div>
                    <div class="flex items-center gap-2 text-[10px] text-gray-400 mb-1">
                        <span class="font-medium"
                            :class="{
                                'text-blue-300': dl.status === 'Queued' || dl.status === 'RetrievingInfo' || dl.status === 'Downloading',
                                'text-amber-300': dl.status === 'Installing',
                                'text-emerald-300': dl.status === 'Completed',
                                'text-red-300': dl.status === 'Failed',
                                'text-gray-500': dl.status === 'Canceled'
                            }"
                            x-text="dl.status === 'Queued' ? 'Queued' : dl.status === 'RetrievingInfo' ? 'Retrieving info…' : dl.status === 'Downloading' ? 'Downloading…' : dl.status === 'Installing' ? 'Extracting…' : dl.status === 'Completed' ? 'Installed' : dl.status === 'Failed' ? 'Failed' : 'Canceled'"></span>
                        <span x-show="dl.gameVersion" x-text="dl.previousModVersion && dl.previousGameVersion ? dl.previousGameVersion + ' → ' + dl.gameVersion : dl.gameVersion"></span>
                        <span x-show="dl.modVersion" x-text="dl.previousModVersion ? 'v' + dl.previousModVersion + ' → v' + dl.modVersion : 'v' + dl.modVersion"></span>
                    </div>
                    <template x-if="(dl.status === 'Downloading' || dl.status === 'Installing') && dl.totalBytes > 0">
                        <div class="relative w-full bg-gray-700 rounded-full h-3.5 overflow-hidden">
                            <div class="h-full rounded-full transition-all duration-300"
                                :class="dl.status === 'Installing' ? 'bg-amber-500' : 'bg-blue-500'"
                                :style="'width: ' + dl.progressPercent + '%'"></div>
                            <span class="absolute inset-0 flex items-center justify-center text-[9px] font-mono text-white/90"
                                x-text="dl.status === 'Installing'
                                    ? dl.downloadedBytes + ' / ' + dl.totalBytes + ' files (' + dl.progressPercent + '%)'
                                    : formatBytes(dl.downloadedBytes) + ' / ' + formatBytes(dl.totalBytes) + ' (' + dl.progressPercent + '%)'"></span>
                        </div>
                    </template>
                    <template x-if="(dl.status === 'Downloading' || dl.status === 'Installing') && dl.totalBytes <= 0">
                        <div class="flex items-center gap-2">
                            <div class="flex-1 bg-gray-700 rounded-full h-2.5 overflow-hidden">
                                <div class="h-full rounded-full animate-pulse" style="width: 100%"
                                    :class="dl.status === 'Installing' ? 'bg-amber-500' : 'bg-blue-500'"></div>
                            </div>
                            <span class="text-[9px] font-mono text-gray-400 shrink-0"
                                x-text="dl.status === 'Installing' ? (dl.downloadedBytes + ' files') : formatBytes(dl.downloadedBytes)"></span>
                        </div>
                    </template>
                    <template x-if="dl.fileName && ['Downloading', 'Installing', 'Completed'].includes(dl.status)">
                        <p class="text-[10px] text-gray-500 mt-0.5 truncate" x-text="dl.fileName"></p>
                    </template>
                    <template x-if="dl.error">
                        <p class="text-red-400 text-[10px] mt-1 truncate" x-text="dl.error"></p>
                    </template>
                </div>
                <template x-if="shouldShowLogGapDivider(idx)">
                    <div class="relative my-2">
                        <div class="h-px bg-gray-700"></div>
                        <span class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-surface-alt px-2 text-[10px] text-gray-400 whitespace-nowrap"
                            x-text="logGapDividerLabel(idx)"></span>
                    </div>
                </template>
                </div>
            </template>
            </div>
        </div>
    </aside>
</div>
